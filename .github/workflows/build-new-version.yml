name: B&P Keycloak image with extensions for new version

on:
    pull_request:
        branches:
            - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Read Keycloak version from Containerfile
        id: keycloak
        run: |
          version=$(grep -E '^ARG KEYCLOAK_VERSION=' Containerfile | cut -d= -f2)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          push: true
          file: Containerfile
          context: .
          build-args: |
            KEYCLOAK_VERSION=${{ steps.keycloak.outputs.version }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKER_IMAGE }}:${{ steps.keycloak.outputs.version }}
          platforms: linux/amd64,linux/arm64
